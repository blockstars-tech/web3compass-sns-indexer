# Local development stack.
#
# In production this service connects to the shared web3compass Postgres.
# For local dev you can run a throwaway Postgres here, but the schema must
# be provisioned by booting `web3compassapi` against the same DB first
# (since this repo runs with `migrationsRun: false`).

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sns-indexer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-portal}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
