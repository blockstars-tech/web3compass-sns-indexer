name: Secret Scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # `gitleaks/gitleaks-action` expects a full GitHub event payload, which `act`
      # doesn't always emulate. When running under `act` (ACT=true), run gitleaks
      # directly via its container instead.
      - name: Scan for secrets (gitleaks, act)
        if: ${{ env.ACT == 'true' }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source . --redact --verbose

      - name: Scan for secrets (gitleaks)
        if: ${{ env.ACT != 'true' }}
        uses: gitleaks/gitleaks-action@v2

