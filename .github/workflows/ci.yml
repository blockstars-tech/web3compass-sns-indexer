name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Unit tests
        # Live-RPC integration tests auto-skip when no SOLANA_RPC_* env
        # is set, so a plain `yarn test` runs only the deterministic suite.
        run: yarn test

      - name: Build
        run: yarn build
